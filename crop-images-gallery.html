<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Images Gallery - All GitHub Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #000000;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .image-card {
            border: 2px solid #000000;
            padding: 15px;
            background: #ffffff;
            text-align: center;
        }

        .image-card img {
            width: 500px;
            height: 500px;
            object-fit: cover;
            border: 1px solid #cccccc;
            display: block;
            margin: 0 auto;
        }

        .filename {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #000000;
            word-break: break-all;
        }

        .status {
            margin-top: 5px;
            font-size: 12px;
            color: #666666;
        }

        .error-image {
            width: 500px;
            height: 500px;
            background: #f0f0f0;
            border: 2px dashed #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999999;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>🌾 All Crop Images from GitHub</h1>
    
    <div style="margin-bottom: 30px; max-width: 1800px; margin-left: auto; margin-right: auto;">
        <label style="display: block; font-weight: bold; margin-bottom: 10px; font-size: 16px;">
            Selected Images:
        </label>
        <textarea 
            id="selectedFilenames" 
            readonly 
            style="width: 100%; min-height: 120px; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; border: 2px solid #000; resize: vertical; background: #f9f9f9;"
            placeholder="Check images below to see their filenames here..."
        ></textarea>
        <div style="margin-top: 10px; color: #666; font-size: 14px;">
            <strong>Selected: <span id="selectedCount">0</span></strong> images
        </div>
    </div>
    
    <div id="gallery" class="gallery"></div>

    <script>
        const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/Henilshingala/crop-recomandation-system/main/Backend/app/media/crops/';
        const GITHUB_API = 'https://api.github.com/repos/Henilshingala/crop-recomandation-system/contents/Backend/app/media/crops';
        
        let loadedImages = [];
        let failedImages = [];

        async function fetchImageListFromGitHub() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div style="text-align: center; padding: 50px; grid-column: 1/-1;">Loading images from GitHub... ⏳</div>';
            
            try {
                const response = await fetch(GITHUB_API);
                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}`);
                }
                
                const files = await response.json();
                
                // Filter only image files
                const imageFiles = files
                    .filter(file => {
                        const ext = file.name.split('.').pop().toLowerCase();
                        return ['jpg', 'jpeg', 'png', 'webp', 'avif', 'gif'].includes(ext);
                    })
                    .map(file => file.name)
                    .sort();
                
                console.log(`Found ${imageFiles.length} images on GitHub:`, imageFiles);
                
                gallery.innerHTML = '';
                imageFiles.forEach(filename => {
                    gallery.appendChild(createImageCard(filename));
                });
                
                // Show summary after all images attempt to load
                setTimeout(() => {
                    showSummary();
                }, 3000);
                
            } catch (error) {
                console.error('Error fetching from GitHub API:', error);
                gallery.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: red;">
                        <h2>❌ Failed to fetch image list from GitHub</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 20px; color: #666;">
                            This might be due to GitHub API rate limits or network issues.<br>
                            Try refreshing the page in a few minutes.
                        </p>
                    </div>
                `;
            }
        }

        function createImageCard(filename) {
            const url = GITHUB_RAW_BASE + filename;
            const card = document.createElement('div');
            card.className = 'image-card';
            card.style.position = 'relative';
            
            // Add checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `chk-${filename}`;
            checkbox.style.cssText = 'position: absolute; top: 10px; left: 10px; width: 25px; height: 25px; cursor: pointer; z-index: 10;';
            checkbox.addEventListener('change', updateSelectedList);
            
            const img = document.createElement('img');
            img.src = url;
            img.alt = filename;
            
            img.onerror = function() {
                failedImages.push(filename);
                console.error(`❌ Failed to load: ${filename}`);
                this.parentElement.innerHTML = `
                    <input type="checkbox" id="chk-${filename}" style="position: absolute; top: 10px; left: 10px; width: 25px; height: 25px; cursor: pointer; z-index: 10;">
                    <div class="error-image">Image not found</div>
                    <div class="filename">${filename}</div>
                    <div class="status" style="color: red;">❌ Failed to load</div>
                `;
                // Re-attach event listener after innerHTML replacement
                document.getElementById(`chk-${filename}`).addEventListener('change', updateSelectedList);
            };
            
            img.onload = function() {
                loadedImages.push(filename);
                console.log(`✅ Loaded: ${filename}`);
                const status = document.createElement('div');
                status.className = 'status';
                status.style.color = 'green';
                status.textContent = '✅ Loaded successfully';
                card.appendChild(status);
            };
            
            const filenameDiv = document.createElement('div');
            filenameDiv.className = 'filename';
            filenameDiv.textContent = filename;
            
            card.appendChild(checkbox);
            card.appendChild(img);
            card.appendChild(filenameDiv);
            
            return card;
        }

        function updateSelectedList() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const selectedFiles = [];
            
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    // Extract filename from checkbox id (remove 'chk-' prefix)
                    const filename = checkbox.id.replace('chk-', '');
                    selectedFiles.push(filename);
                }
            });
            
            // Update textarea
            const textarea = document.getElementById('selectedFilenames');
            textarea.value = selectedFiles.join('\n');
            
            // Update count
            document.getElementById('selectedCount').textContent = selectedFiles.length;
        }

        function showSummary() {
            const total = loadedImages.length + failedImages.length;
            const successRate = total > 0 ? ((loadedImages.length / total) * 100).toFixed(1) : 0;
            
            console.log('\n📊 SUMMARY:');
            console.log(`✅ Loaded: ${loadedImages.length}`);
            console.log(`❌ Failed: ${failedImages.length}`);
            console.log(`📈 Success Rate: ${successRate}%`);
            
            if (failedImages.length > 0) {
                console.log('\n❌ Failed images:', failedImages);
            }
        }

        // Load images on page load
        window.addEventListener('load', fetchImageListFromGitHub);
    </script>
</body>
</html>
