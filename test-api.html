<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; }
        #result { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Crop Recommendation API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Loading...';
            
            const testData = {
                N: 90,
                P: 42,
                K: 43,
                temperature: 24.5,
                humidity: 68,
                ph: 6.7,
                rainfall: 120
            };

            try {
                const response = await fetch('https://crop-recomandation-system.onrender.com/api/predict/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const error = await response.text();
                    resultDiv.textContent = `Error ${response.status}:\n${error}`;
                    return;
                }

                const data = await response.json();
                console.log('Response data:', data);
                
                resultDiv.textContent = 
                    `✅ SUCCESS!\n\n` +
                    `Number of recommendations: ${data.recommendations?.length || 0}\n\n` +
                    `Full Response:\n${JSON.stringify(data, null, 2)}`;
            } catch (err) {
                console.error('Error:', err);
                resultDiv.textContent = `❌ Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
